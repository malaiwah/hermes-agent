name: Build and Push Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push image
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          docker build --network=host \
            -t 10.15.0.6:3300/angelos/hermes-agent:latest \
            -t 10.15.0.6:3300/angelos/hermes-agent:${{ github.sha }} \
            .
          docker push 10.15.0.6:3300/angelos/hermes-agent:latest
          docker push 10.15.0.6:3300/angelos/hermes-agent:${{ github.sha }}
