name: Build and Push Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure insecure registry
        run: |
          # Docker CLI talks to Podman socket — configure both sides
          sudo mkdir -p /etc/docker /etc/containers/registries.conf.d
          echo '{"insecure-registries": ["10.15.0.6:3300"]}' | sudo tee /etc/docker/daemon.json
          printf '[[registry]]\nlocation = "10.15.0.6:3300"\ninsecure = true\n' | \
            sudo tee /etc/containers/registries.conf.d/gitea.conf

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | \
            docker login 10.15.0.6:3300 -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build image
        run: |
          docker build --network=host -t 10.15.0.6:3300/angelos/hermes-agent:latest .
          docker tag 10.15.0.6:3300/angelos/hermes-agent:latest \
                     10.15.0.6:3300/angelos/hermes-agent:${{ github.sha }}

      - name: Push image
        run: |
          docker push 10.15.0.6:3300/angelos/hermes-agent:latest
          docker push 10.15.0.6:3300/angelos/hermes-agent:${{ github.sha }}
