name: Build and Push Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman remote
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq podman-remote >/dev/null 2>&1

      - name: Build image
        run: |
          podman-remote --url unix:///var/run/docker.sock build --network=host \
            -t 10.15.0.6:3300/angelos/hermes-agent:latest \
            -t 10.15.0.6:3300/angelos/hermes-agent:${{ github.sha }} \
            .

      - name: Push image
        run: |
          podman-remote --url unix:///var/run/docker.sock login --tls-verify=false \
            -u "${{ secrets.REGISTRY_USER }}" -p "${{ secrets.REGISTRY_TOKEN }}" \
            10.15.0.6:3300
          podman-remote --url unix:///var/run/docker.sock push --tls-verify=false \
            10.15.0.6:3300/angelos/hermes-agent:latest
          podman-remote --url unix:///var/run/docker.sock push --tls-verify=false \
            10.15.0.6:3300/angelos/hermes-agent:${{ github.sha }}